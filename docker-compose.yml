services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-iptv}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-iptv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iptv-network

  ffmpeg-service:
    build: ./ffmpeg-service
    expose:
      - "8081"
    environment:
      MINIO_URL: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      CALLBACK_URL: http://spring-boot:8080/internal/transcode/callback
    depends_on:
      - minio
    networks:
      - iptv-network

  spring-boot:
    build: ./backend
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-iptv}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TMDB_API_KEY: ${TMDB_API_KEY}
      SERVER_URL: ${SERVER_URL:-localhost}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME:-admin}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD:-admin123}
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL:-admin@iptv.com}
      MINIO_URL: http://minio:9000
      MINIO_USER: ${MINIO_USER:-minioadmin}
      MINIO_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
      UPLOAD_TEMP_PATH: /tmp/uploads
    volumes:
      - ./streaming/hls:/hls
      - upload-temp:/tmp/uploads
    networks:
      - iptv-network

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"
    expose:
      - "9000"
    volumes:
      - ./streaming/config/mediamtx.yml:/mediamtx.yml
    networks:
      - iptv-network

  ffmpeg:
    image: linuxserver/ffmpeg:latest
    depends_on:
      - mediamtx
    volumes:
      - ./streaming/hls:/tmp/hls
      - ./streaming/config/ffmpeg-start.sh:/ffmpeg-start.sh
    restart: unless-stopped
    entrypoint: sh /ffmpeg-start.sh
    networks:
      - iptv-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./data:/data
      - ./streaming/hls:/hls
    depends_on:
      - spring-boot
      - mediamtx
    networks:
      - iptv-network

  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD:-minioadmin}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iptv-network

  minio-setup:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/vod;
      mc anonymous set download local/vod/filmes;
      mc anonymous set download local/vod/series;
      echo 'Bucket VOD criado';
      "
    networks:
      - iptv-network

volumes:
  postgres-data:
  minio-data:

networks:
  iptv-network:
    name: iptv-network
    driver: bridge
  upload-temp:
