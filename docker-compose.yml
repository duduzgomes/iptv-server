services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iptv-network

  minio:
    image: quay.io/minio/minio:latest
    ports:
      - "9001:9001"
    expose:
      - "9000"
    environment:
      MINIO_ROOT_USER: ${MINIO_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_PASSWORD}
    volumes:
      - minio-data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iptv-network

  minio-setup:
    image: quay.io/minio/mc:latest
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_USER:-minioadmin} ${MINIO_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/vod;
      mc anonymous set download local/vod/filmes;
      mc anonymous set download local/vod/series;
      echo 'Bucket VOD criado';
      "
    networks:
      - iptv-network

  mediamtx:
    image: bluenviron/mediamtx:latest
    environment:
      MEDIAMTX_RTMP_PUBLISH_USER: ${MEDIAMTX_RTMP_PUBLISH_USER}
      MEDIAMTX_RTMP_PUBLISH_PASS: ${MEDIAMTX_RTMP_PUBLISH_PASS}
    ports:
      - "1935:1935"
    expose:
      - "8888"
    volumes:
      - ./streaming/config/mediamtx.yml:/mediamtx.yml
    networks:
      - iptv-network

  spring-boot:
    build: ./backend
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      minio-setup:
        condition: service_completed_successfully
    environment:
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
      STREAMING_FFMPEG_SERVICE_URL: ${STREAMING_FFMPEG_SERVICE_URL}
      TMDB_API_KEY: ${TMDB_API_KEY}
      ADMIN_DEFAULT_USERNAME: ${ADMIN_DEFAULT_USERNAME}
      ADMIN_DEFAULT_PASSWORD: ${ADMIN_DEFAULT_PASSWORD}
      ADMIN_DEFAULT_EMAIL: ${ADMIN_DEFAULT_EMAIL}
      MINIO_URL: ${MINIO_URL}
      MINIO_PUBLIC_URL: ${MINIO_PUBLIC_URL}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      XSTREAM_SESSION_DURATION_HOURS: ${XSTREAM_SESSION_DURATION_HOURS}
      XSTREAM_SERVER_PORT: ${XSTREAM_SERVER_PORT}
      SERVER_URL: ${SERVER_URL}
      SERVER_HTTPS_PORT: ${SERVER_HTTPS_PORT}
      SERVER_PROTOCOL: ${SERVER_PROTOCOL}
      SERVER_RTMP_PORT: ${SERVER_RTMP_PORT}
      SERVER_TIMEZONE: ${SERVER_TIMEZONE}
      MEDIAMTX_RTMP_PUBLISH_USER: ${MEDIAMTX_RTMP_PUBLISH_USER}
      MEDIAMTX_RTMP_PUBLISH_PASS: ${MEDIAMTX_RTMP_PUBLISH_PASS}
    volumes:
      - ./streaming/hls:/hls
      - upload-temp:/tmp/uploads
    networks:
      - iptv-network

  ffmpeg-service:
    build: ./ffmpeg-service
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video, utility]
    expose:
      - "8081"
    environment:
      MINIO_URL: ${MINIO_URL}
      MINIO_USER: ${MINIO_USER}
      MINIO_PASSWORD: ${MINIO_PASSWORD}
      MINIO_BUCKET: ${MINIO_BUCKET}
      STREAMING_CALLBACK_URL: ${STREAMING_CALLBACK_URL}
      INTERNAL_SECRET: ${INTERNAL_SECRET}
    depends_on:
      minio:
        condition: service_healthy
      spring-boot:
        condition: service_started
    networks:
      - iptv-network

  nginx:
    build: ./nginx
    ports:
      - "80:80"
      - "9000:9000"
    volumes:
      - hls_data:/hls
      - ./nginx/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf
      - ./nginx/lua:/usr/local/openresty/nginx/conf/lua
      - ./backend/src/main/resources/certs/public.pem:/etc/nginx/certs/public.pem:ro
    depends_on:
      - spring-boot
      - mediamtx
      - minio
      - live-service
    networks:
      - iptv-network

  live-service:
    build: ./live-service
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu, video, utility]
    expose:
      - "8082"
    environment:
      STREAMING_FFMPEG_PATH: ${STREAMING_FFMPEG_PATH}
      STREAMING_HLS_PATH: ${STREAMING_HLS_PATH}
      STREAMING_HLS_SEGMENT_DURATION: ${STREAMING_HLS_SEGMENT_DURATION}
      STREAMING_HLS_SEGMENT_COUNT: ${STREAMING_HLS_SEGMENT_COUNT}
      MEDIAMTX_URL: ${MEDIAMTX_URL}
      MEDIAMTX_RTMP_PUBLISH_USER: ${MEDIAMTX_RTMP_PUBLISH_USER}
      MEDIAMTX_RTMP_PUBLISH_PASS: ${MEDIAMTX_RTMP_PUBLISH_PASS}
    volumes:
      - hls_data:/hls
    depends_on:
      - mediamtx
    networks:
      - iptv-network
  cloudflared:
    image: cloudflare/cloudflared:latest
    restart: unless-stopped
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    networks:
      - iptv-network

volumes:
  postgres-data:
  minio-data:
  upload-temp:
  hls_data:

networks:
  iptv-network:
    name: iptv-network
    driver: bridge
