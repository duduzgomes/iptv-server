services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: ${DB_NAME:-iptv}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME:-iptv}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - iptv-network

  spring-boot:
    build: ./backend
    expose:
      - "8080"
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: docker
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-iptv}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      TMDB_API_KEY: ${TMDB_API_KEY}
      SERVER_URL: ${SERVER_URL:-localhost}
    networks:
      - iptv-network

  mediamtx:
    image: bluenviron/mediamtx:latest
    ports:
      - "1935:1935"
    expose:
      - "9000"
    volumes:
      - ./streaming/config/mediamtx.yml:/mediamtx.yml
    networks:
      - iptv-network

  ffmpeg:
    image: linuxserver/ffmpeg:latest
    depends_on:
      - mediamtx
    volumes:
      - ./streaming/hls:/tmp/hls
      - ./streaming/config/ffmpeg-start.sh:/ffmpeg-start.sh
    restart: unless-stopped
    entrypoint: sh /ffmpeg-start.sh
    networks:
      - iptv-network

  nginx:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf
      - ./data:/data
      - ./streaming/hls:/hls
    depends_on:
      - spring-boot
      - mediamtx
    networks:
      - iptv-network

volumes:
  postgres-data:

networks:
  iptv-network:
    name: iptv-network
    driver: bridge
