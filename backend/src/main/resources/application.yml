spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:iptv}
    username: ${DB_USER}
    password: ${DB_PASSWORD}

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: true

  liquibase:
    change-log: classpath:db/changelog/db.changelog-master.xml

  cache:
    type: simple

  threads:
    virtual:
      enabled: true

server:
  port: 8080

jwt:
  private-key-location: classpath:certs/private.pem
  expiration: 3600

streaming:
  ffmpeg-service-url: ${STREAMING_FFMPEG_SERVICE_URL:http://ffmpeg-service:8081}
  vod-base-url: ${VOD_BASE_URL:http://localhost/vod}

tmdb:
  api-key: ${TMDB_API_KEY}
  base-url: https://api.themoviedb.org/3
  language: pt-BR
  image-base-url: https://image.tmdb.org/t/p/w500
  backdrop-base-url: https://image.tmdb.org/t/p/w1280

admin:
  default:
    username: ${ADMIN_DEFAULT_USERNAME:admin}
    password: ${ADMIN_DEFAULT_PASSWORD:admin123}
    email: ${ADMIN_DEFAULT_EMAIL:admin@iptv.com

minio:
  url: ${MINIO_URL:http://localhost:9000}
  user: ${MINIO_USER:minioadmin}
  password: ${MINIO_PASSWORD:minioadmin}
  bucket: vod

xtream:
  session:
    duration-hours: ${SESSION_DURATION_HOURS:4}
  server:
    url: ${SERVER_URL:localhost}
    port: ${SERVER_PORT:80}
    https-port: ${SERVER_HTTPS_PORT:443}
    protocol: ${SERVER_PROTOCOL:http}
    rtmp-port: ${SERVER_RTMP_PORT:1935}
    timezone: America/Sao_Paulo

  hls-base-url: ${HLS_BASE_URL:http://localhost:8080/hls}
  files-base-url: ${FILES_BASE_URL:http://localhost:8080/files}
