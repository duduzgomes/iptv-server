worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;
    multi_accept on;
}

http {
    include       mime.types;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=xtream:10m rate=30r/m;
    lua_shared_dict concurrency_cache 10m;

    map $http_cf_connecting_ip $real_client_ip {
        ""      $remote_addr;
        default $http_cf_connecting_ip;
    }

    log_format main '$remote_addr - $request_method $uri $status';
    access_log /dev/stdout main;

    init_by_lua_block {
        local f = io.open("/etc/nginx/certs/public.pem", "r")
        if not f then
            ngx.log(ngx.ERR, "[vod-auth] public.pem não encontrado")
            os.exit(1)
        end
        PUBLIC_KEY = f:read("*a")
        f:close()
    }

    server {
        listen 80;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        location /auth/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://spring-boot:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /player_api.php {
            limit_req zone=xtream burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://spring-boot:8080;

            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        }

        location /vod/ {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin'  '*'                              always;
                add_header 'Access-Control-Allow-Methods' 'GET, PUT, POST, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Range, x-amz-*'  always;
                add_header 'Access-Control-Max-Age'       3600                             always;
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://minio:9000/vod/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            add_header Access-Control-Allow-Origin  '*' always;
            add_header Access-Control-Allow-Methods 'GET, PUT, POST, DELETE, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type, Range, x-amz-*' always;
            add_header X-Debug-Rota "bloco-minio-vod" always;

            client_max_body_size 0;
            proxy_buffering off;
            proxy_request_buffering off;
            proxy_read_timeout 300s;
            proxy_send_timeout 300s;
        }

        location /vod-mp4/ {
            access_by_lua_file /usr/local/openresty/nginx/conf/lua/auth.lua;

            proxy_pass http://minio:9000/vod/;

            proxy_set_header Host minio:9000;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;

            proxy_buffering off;
            proxy_request_buffering off;

            proxy_hide_header Content-Type;

            add_header X-Debug-Rota "bloco-mp4" always;
            add_header Content-Type "video/mp4" always;
            add_header Accept-Ranges bytes always;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type,Range' always;
            add_header Cache-Control "public, max-age=3600" always;
        }

        location /vod-hls/ {
            access_by_lua_file /usr/local/openresty/nginx/conf/lua/auth.lua;

            proxy_pass http://minio:9000/vod/;
            proxy_set_header Host minio:9000;
            proxy_set_header Accept-Encoding "";

            sub_filter_types *;
            sub_filter_once  off;
            sub_filter '.ts'    '.ts?sjwt=$arg_sjwt';
            sub_filter '.m3u8'  '.m3u8?sjwt=$arg_sjwt';

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            add_header Access-Control-Allow-Origin '*' always;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        }

        location /hls/ {
            alias /hls/;
            sendfile      on;

            types {
                application/vnd.apple.mpegurl  m3u8;
                video/MP2T                     ts;
            }

            location ~* \.m3u8$ {
                add_header Access-Control-Allow-Origin  '*'   always;
                add_header Access-Control-Allow-Methods 'GET' always;
                add_header Access-Control-Allow-Headers 'Range, Content-Type' always;
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            }

            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=60" always;
                add_header Access-Control-Allow-Origin  '*'   always;
                add_header Access-Control-Allow-Methods 'GET' always;
                add_header Access-Control-Allow-Headers 'Range, Content-Type' always;
            }
        }

        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' $http_origin always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, PATCH, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type, Authorization, Range' always;
                add_header 'Access-Control-Max-Age' 3600 always;
                add_header 'Content-Length' 0;
                return 204;
            }
            proxy_pass http://spring-boot:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header X-Debug-Rota "bloco-raiz" always;
        }

    }

    server {
        listen 9000;

        location / {
            proxy_pass http://minio:9000/;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $real_client_ip;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_pass_header Server;
            client_max_body_size 0;
            proxy_buffering off;
            proxy_request_buffering off;

            add_header X-Debug-Rota "bloco-upload" always;
        }
    }
}
