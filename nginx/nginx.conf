worker_processes auto;

events {
    worker_connections 1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    lua_shared_dict vod_ip_cache 10m;

    init_by_lua_block {
        local f = io.open("/etc/nginx/certs/public.pem", "r")
        if not f then
            ngx.log(ngx.ERR, "[vod-auth] public.pem não encontrado")
            os.exit(1)
        end
        PUBLIC_KEY = f:read("*a")
        f:close()
    }

    server {
        listen 80;

        # Preflight global — intercepta OPTIONS antes de qualquer proxy
        location / {
            if ($request_method = 'OPTIONS') {
                add_header 'Access-Control-Allow-Origin' '*' always;
                add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
                add_header 'Access-Control-Allow-Headers' 'Content-Type,Range,Authorization,ngrok-skip-browser-warning' always;
                add_header 'Access-Control-Max-Age' 1728000;
                add_header 'Content-Type' 'text/plain; charset=utf-8';
                add_header 'Content-Length' 0;
                return 204;
            }

            proxy_pass http://spring-boot:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_hide_header 'Access-Control-Allow-Origin';

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Range,Authorization,ngrok-skip-browser-warning' always;
            add_header 'Access-Control-Expose-Headers' 'Content-Length,Content-Range' always;
        }

        # HLS ao vivo — serve do volume local
        location /hls {
            alias /hls;
            types {
                application/vnd.apple.mpegurl m3u8;
                video/mp2t ts;
            }
            add_header Cache-Control no-cache;
            add_header Access-Control-Allow-Origin *;
        }

        # VOD — proxy pro MinIO
