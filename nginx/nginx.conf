worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    use epoll;       
    multi_accept on;
}

http {
    include       mime.types;
    sendfile      on;
    limit_req_zone $binary_remote_addr zone=login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=xtream:10m rate=30r/m;
    lua_shared_dict vod_ip_cache 10m;

    log_format main '$remote_addr - $request_method $uri $status';
    access_log /dev/stdout main;

    init_by_lua_block {
        local f = io.open("/etc/nginx/certs/public.pem", "r")
        if not f then
            ngx.log(ngx.ERR, "[vod-auth] public.pem não encontrado")
            os.exit(1)
        end
        PUBLIC_KEY = f:read("*a")
        f:close()

        function validar_vod_auth()
            local cjson   = require("cjson")
            local jwt_lib = require("resty.jwt")
            local cache   = ngx.shared.vod_ip_cache

            local function deny(status, msg)
                ngx.status = status
                ngx.header["Content-Type"] = "application/json"
                ngx.say(cjson.encode({ error = msg }))
                return ngx.exit(status)
            end

            local function dir_from_uri(u)
                local d = u:match("^(/[^/]+/[^/]+/%d+/)")
                if d then return d end
                return u:match("^(.+/)") or u
            end

            local uri       = ngx.var.uri
            local client_ip = ngx.var.http_x_real_ip or ngx.var.remote_addr
            client_ip = client_ip:match("^%s*(.-)%s*$")
            local sjwt      = ngx.var.arg_sjwt
            local dir       = dir_from_uri(uri)

            if sjwt and sjwt ~= "" then
                local obj = jwt_lib:verify(PUBLIC_KEY, sjwt)

                if not obj or not obj.verified then
                    ngx.log(ngx.WARN, "[vod-auth] JWT inválido: ", obj and obj.reason)
                    return deny(401, "Token inválido")
                end

                if obj.header.alg ~= "RS256" then
                    return deny(401, "Algoritmo inválido")
                end

                local payload = obj.payload

                if payload.exp and payload.exp < ngx.time() then
                    return deny(401, "Token expirado")
                end

                if payload.ip and payload.ip ~= client_ip then
                    ngx.log(ngx.WARN, "[vod-auth] IP divergente payload=", payload.ip, " real=", client_ip)
                    return deny(403, "IP não autorizado")
                end

                local ttl = math.max(payload.exp - ngx.time(), 1)
                cache:set(dir, client_ip, ttl)

                ngx.log(ngx.INFO, "[vod-auth] sessão iniciada sub=", payload.sub, " dir=", dir, " ttl=", ttl)
                return

            else
                local cached_ip = cache:get(dir)

                if not cached_ip then
                    ngx.log(ngx.WARN, "[vod-auth] cache miss dir=", dir)
                    return deny(401, "Sessão expirada")
                end

                if cached_ip ~= client_ip then
                    ngx.log(ngx.WARN, "[vod-auth] IP inválido esperado=", cached_ip, " real=", client_ip)
                    return deny(403, "IP não autorizado")
                end

                return
            end
        end
    }

    server {
        listen 80;

        add_header X-Content-Type-Options "nosniff" always;
        add_header X-Frame-Options "DENY" always;
        add_header Referrer-Policy "no-referrer" always;

        location /auth/login {
            limit_req zone=login burst=3 nodelay;
            limit_req_status 429;
            proxy_pass http://spring-boot:8080;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, PUT, DELETE, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Range,Authorization,ngrok-skip-browser-warning,Cache-Control,Pragma' always;
        }

        location /player_api.php {
            limit_req zone=xtream burst=10 nodelay;
            limit_req_status 429;
            proxy_pass http://spring-boot:8080;
            
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            add_header 'Access-Control-Allow-Origin' '*' always;
            add_header 'Access-Control-Allow-Methods' 'GET, POST, OPTIONS' always;
            add_header 'Access-Control-Allow-Headers' 'Content-Type,Range,Authorization,ngrok-skip-browser-warning,Cache-Control,Pragma' always;
        }

        location /vod-mp4/ {

            access_by_lua_block { validar_vod_auth() }

            proxy_pass http://minio:9000/vod/;
            
            proxy_set_header Host minio:9000;
            proxy_set_header Range $http_range;
            proxy_set_header If-Range $http_if_range;
            
            proxy_buffering off;
            proxy_request_buffering off;

            proxy_hide_header Content-Type;

            add_header X-Debug-Rota "bloco-mp4" always;
            add_header Content-Type "video/mp4" always;
            add_header Accept-Ranges bytes always;
            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, OPTIONS' always;
            add_header Access-Control-Allow-Headers 'Content-Type,Range' always;
            add_header Cache-Control "public, max-age=3600" always;
        }

        location /vod-hls/ {
            
            access_by_lua_block { validar_vod_auth() }

            proxy_pass http://minio:9000/vod/;
            proxy_set_header Host minio:9000;

            proxy_hide_header Access-Control-Allow-Origin;
            proxy_hide_header Access-Control-Allow-Methods;
            proxy_hide_header Access-Control-Allow-Headers;

            add_header Access-Control-Allow-Origin '*' always;
            add_header Content-Type "application/x-mpegURL" always;
            add_header Cache-Control "public, max-age=3600" always;
            add_header Accept-Ranges bytes always;
        }

        location /hls/ {
            alias /var/hls/;

            types {
                application/vnd.apple.mpegurl  m3u8;
                video/MP2T                     ts;
            }

            location ~* \.m3u8$ {
                add_header Access-Control-Allow-Origin  '*'   always;
                add_header Access-Control-Allow-Methods 'GET' always;
                add_header Access-Control-Allow-Headers 'Range, Content-Type' always;
                add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            }

            location ~* \.ts$ {
                add_header Cache-Control "public, max-age=60" always;
                add_header Access-Control-Allow-Origin  '*'   always;
                add_header Access-Control-Allow-Methods 'GET' always;
                add_header Access-Control-Allow-Headers 'Range, Content-Type' always;
            }
        }

        location / {
            proxy_pass http://spring-boot:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_hide_header 'Access-Control-Allow-Origin';

            add_header Access-Control-Allow-Origin '*' always;
            add_header Access-Control-Allow-Methods 'GET, POST, PUT, DELETE' always;
            add_header Access-Control-Allow-Headers 'Content-Type,Range,Authorization' always;
            add_header X-Debug-Rota "bloco-raiz" always;
        }

    }

    server {
        listen 9000;

        location / {
            proxy_pass http://minio:9000;
            proxy_set_header Host minio:9000;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_pass_header Server;
            client_max_body_size 0;
            proxy_buffering off;
            proxy_request_buffering off;
        }
    }
}